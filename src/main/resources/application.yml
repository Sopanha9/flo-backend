spring:
  application:
    name: flo-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flo_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:flo-super-secret-key-change-in-production-min-256-bits}
  expiration: 86400000        # 24 hours
  refresh-expiration: 604800000 # 7 days

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

firebase:
  credentials: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

logging:
  level:
    com.flo: DEBUG
    org.springframework.security: INFO
